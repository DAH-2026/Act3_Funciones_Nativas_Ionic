<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>New report</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-content>
      @if (currentReport(); as reportValue) {
      <img [src]="reportValue.photoUri" alt="Report photo" />
      } @else {
      <img src="assets/report-placeholder.svg" alt="No photo captured yet" />
      }
    </ion-card-content>
  </ion-card>

  @if (currentReport(); as reportValue) {
  <ion-item>
    <ion-label>
      Latitude: {{ reportValue.latitude }} - Longitude: {{ reportValue.longitude
      }}
    </ion-label>
  </ion-item>
  }

  <ion-button expand="block" (click)="captureReport()">
    Take photo from camera
  </ion-button>

  <ion-button expand="block" color="tertiary" (click)="showDialog()">
    Show dialog (Capacitor)
  </ion-button>
</ion-content>
