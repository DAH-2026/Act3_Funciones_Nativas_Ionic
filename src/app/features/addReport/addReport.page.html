<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Nueva incidencia</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-content>
      @if (incidenciaActual(); as incidenciaValue) {
      <img [src]="incidenciaValue.photoUri" alt="Foto de la incidencia" />
      } @else {
      <img
        src="assets/incidencia-placeholder.svg"
        alt="Aun no se ha capturado ninguna foto"
      />
      }
    </ion-card-content>
  </ion-card>

  @if (incidenciaActual(); as incidenciaValue) {
  <ion-item>
    <ion-label>
      Latitud: {{ incidenciaValue.latitude }} - Longitud: {{
      incidenciaValue.longitude }}
    </ion-label>
  </ion-item>
  }

  <ion-button expand="block" (click)="capturarIncidencia()">
    Obtener foto desde camara
  </ion-button>
  
  <ion-button expand="block" color="tertiary" (click)="mostrarDialog()">
    Mostrar diálogo (Capacitor)
  </ion-button>
</ion-content>
