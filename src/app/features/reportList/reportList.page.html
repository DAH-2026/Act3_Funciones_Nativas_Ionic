<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Reports list</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    @for (report of sampleReports(); track report.id) {
    <ion-item button detail="true" (click)="showUnderConstructionMessage()">
      <ion-label>
        <h2>{{ report.title }}</h2>
        <p>{{ report.details }}</p>
      </ion-label>
    </ion-item>
    }
  </ion-list>
</ion-content>
